version: "2"
sql:
  - engine: "postgresql"
    queries:
      - ./internal/infrastructure/storage/sqlc/core/queries.sql
    schema:
      - ./internal/infrastructure/storage/postgres/core/001_create_core_tables.sql
    gen:
      go:
        package: "coredb"
        out: "./internal/infrastructure/storage/sqlc/core"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "netbox_go/pkg/types.ID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "varchar"
            nullable: true
            go_type: "string"
